{% extends "base.html" %}
{% block content %}

<div class="auth-container">

    <div class="auth-card">

        <h1>Edit Task ✏️</h1>

        <form method="POST">

            <input type="text"
                   name="title"
                   value="{{ task.title }}"
                   required>

            <textarea name="description">
{{ task.description }}
            </textarea>

            <select name="priority">

                <option value="Low"
                {% if task.priority=="Low" %}
                selected
                {% endif %}>
                Low
                </option>

                <option value="Medium"
                {% if task.priority=="Medium" %}
                selected
                {% endif %}>
                Medium
                </option>

                <option value="High"
                {% if task.priority=="High" %}
                selected
                {% endif %}>
                High
                </option>

            </select>

            <input type="date"
                   name="due_date"
                   value="{{ task.due_date }}">

            <select name="status">

                <option value="Pending"
                {% if task.status=="Pending" %}
                selected
                {% endif %}>
                Pending
                </option>

                <option value="Completed"
                {% if task.status=="Completed" %}
                selected
                {% endif %}>
                Completed
                </option>

            </select>

            <button type="submit">
                Save Changes
            </button>

        </form>

    </div>

</div>

{% endblock %}
